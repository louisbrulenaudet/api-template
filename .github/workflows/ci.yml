name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  LOGFIRE_SEND_TO_LOGFIRE: "false"
  LOGFIRE_PYDANTIC_PLUGIN_RECORD: "off"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint and tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run lint with ruff
        run: uv run --locked ruff check .

      - name: Run type check with ty
        run: uv run --locked ty check .

      - name: Run tests with pytest
        run: uv run --locked pytest -q

  docker-build:
    name: Build runtime image
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        env:
          DOCKER_BUILDKIT: "1"
        run: docker build --target runtime -t backend:runtime .
